# 🧠 Manifesto de Gatilhos de Inteligência (Auto-Knowledge)
# Governança: STATE / Jarvis (Maestro)
# 
# Define quais perfis e conhecimentos devem ser carregados AUTOMATICAMENTE 
# pelo Jarvis ao identificar determinadas palavras-chave no fluxo de trabalho.

triggers:
  - keywords: ["disparo", "broadcast", "massa", "campanha"]
    profiles_activated: ["vLegal", "vOps"]
    mandatory_knowledge:
      - "playbooks/governanca/lgpd_playbook.md"
    action: "Block until LGPD check passes."

  - keywords: ["roi", "viabilidade", "preço", "custo", "orçamento", "financeiro"]
    profiles_activated: ["vCFO", "vController"]
    mandatory_knowledge:
      - "contexts/conselho_de_guerra/01_inteligencia_financeira/"
      - "playbooks/governanca/matriz-acionamento-perfis-virtuais.md"
    action: "Require cost/benefit evaluation, orcado x realizado and owner of financial deviation before execution."

  - keywords: ["funcionalidade", "saas", "design", "produto", "feature", "landing page"]
    profiles_activated: ["vCVO", "vCEO"]
    mandatory_knowledge:
      - "contexts/conselho_de_guerra/03_visao_de_produto_e_market_fit/A Startup Enxuta - Eric Ries.pdf"
      - "contexts/conselho_de_guerra/03_visao_de_produto_e_market_fit/A-Cabeça-de-Steve-Jobs.pdf"
      - "contexts/conselho_de_guerra/03_visao_de_produto_e_market_fit/Russell Brunson - Doctom Secrets (traduzido).pdf"
    action: "Enforce lean UX and user-centric architecture validation."

  - keywords: ["bug", "erro", "lento", "otimização", "refatoração", "performance"]
    profiles_activated: ["vOps"]
    mandatory_knowledge:
      - "contexts/conselho_de_guerra/04_arquitetura_e_automacao_ti/Sistemas_Operacionais_Modernos_Tanenbaum.pdf"
    action: "Inject efficiency and robust architecture patterns before suggesting fix."

  - keywords: ["falso positivo", "falso negativo", "retrabalho", "não fazer", "nao fazer", "abortar", "bloquear", "guardrail", "risco"]
    profiles_activated: ["vAudit", "vCFO", "vOps", "vAdminOps"]
    mandatory_knowledge:
      - "playbooks/jarvis.intake-gate.md"
      - "memory/jarvis.state-model.md"
      - "knowledge/trace-grading.md"
      - "knowledge/2026-03-24-mesa-perfis-virtuais-governanca-e-enforcement.md"
      - "playbooks/governanca/matriz-no-go-bloqueio-aborto-e-uso-ativo.md"
    action: "Require explicit no-go paths, cost-of-error review, process guardrails and abort/bloqueio decision before execution."

  - keywords: ["hipótese", "hipotese", "experimento", "mvp", "lean", "startup enxuta", "aprendizado validado", "survey", "entrevista", "discovery"]
    profiles_activated: ["vCVO", "vAudit", "vCEO"]
    mandatory_knowledge:
      - "contexts/conselho_de_guerra/03_visao_de_produto_e_market_fit/A Startup Enxuta - Eric Ries.pdf"
      - "knowledge/2026-03-24-mesa-perfis-virtuais-governanca-e-enforcement.md"
    action: "Require test-card logic, anti-vanity metrics and explicit hypothesis before changing product, prompts or automations."

  - keywords: ["nomenclatura", "perfil", "agente", "c-level", "backlog", "git project", "governança", "governanca", "regra"]
    profiles_activated: ["vAudit", "vCVO", "vOps", "vAdminOps"]
    mandatory_knowledge:
      - "registry/agents.yaml"
      - "registry/virtual_team_taxonomy.yaml"
      - "playbooks/auto_intelligence_hook.md"
    action: "Enforce canonical names, ownership and materialization in backlog/rules/runbooks before closing the round."

  - keywords: ["variância", "variancia", "desvio", "budget", "orcado", "realizado", "unit economics", "controle"]
    profiles_activated: ["vController", "vCFO"]
    mandatory_knowledge:
      - "playbooks/governanca/matriz-acionamento-perfis-virtuais.md"
      - "knowledge/2026-03-24-mesa-paralela-a-b-vcontroller-adminops-finops.md"
    action: "Require target vs actual vs variance, threshold, owner and recovery plan."

  - keywords: ["fila", "handoff", "sop", "rotina", "administrativo", "processo", "cadência operacional", "cadencia operacional"]
    profiles_activated: ["vAdminOps", "vCEO", "vAudit"]
    mandatory_knowledge:
      - "playbooks/governanca/matriz-acionamento-perfis-virtuais.md"
      - "playbooks/governanca/matriz-no-go-bloqueio-aborto-e-uso-ativo.md"
    action: "Require owner, SLA, queue state, handoff quality and explicit anti-retrabalho controls."

  - keywords: ["finops", "custo de nuvem", "cloud cost", "aws billing", "token", "custo de ia", "latência x custo", "latencia x custo"]
    profiles_activated: ["vFinOps", "vCFO", "vOps"]
    mandatory_knowledge:
      - "playbooks/governanca/matriz-acionamento-perfis-virtuais.md"
      - "knowledge/2026-03-24-mesa-paralela-a-b-vcontroller-adminops-finops.md"
    action: "Require cost driver mapping, unit cost, optimization hypothesis, rollback and service-quality protection before cost cuts."
